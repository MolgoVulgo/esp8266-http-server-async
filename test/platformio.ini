[platformio]
default_envs = native
src_dir = src
include_dir = include
test_dir = test

[env:native]
platform = native
test_framework = custom
test_build_src = yes
build_flags =
    -std=gnu++11
    -Iinclude
    -Isrc
    -DHTTP_BUILD_HOST_TEST_MAIN
    -DHTTP_TCP_ADAPTER_STUB
build_src_filter =
    +<*>
