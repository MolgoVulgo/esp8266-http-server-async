[platformio]
src_dir = src

[http_test]
build_flags =
  -D HTTP_TEST_PORT=80
  -D HTTP_ENABLE_STATIC_FILES=0
  -D TCP_NETWORK_TASK_STACK_SIZE=2048

[wifi]
build_flags =
  -D WIFI_SSID=\"CHANGE_ME_SSID\"
  -D WIFI_PASSWORD=\"CHANGE_ME_PASSWORD\"

[env:esp12e]
platform = espressif8266
board = esp12e
framework = esp8266-rtos-sdk
monitor_speed = 74880
build_type = debug

lib_deps =
  symlink://../..
  symlink:///home/kaj/Develop/000-PlatformIO/lib/esp8266-tcp-transport

build_flags =
  ${http_test.build_flags}
  ${wifi.build_flags}
  -D HTTP_DEBUG=1
